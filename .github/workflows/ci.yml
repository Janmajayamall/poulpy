name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      POULPY_FEATURES: hal-bench,core-bench,bin-fhe-bench,ckks-bench
      POULPY_AVX_FEATURES: hal-bench,core-bench,bin-fhe-bench,ckks-bench,enable-avx

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install pinned Rust nightly
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: nightly-2026-03-21
        components: clippy, rustfmt

    - name: Cache cargo deps
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    # Detect whether runner supports AVX2 + FMA
    - name: Detect AVX support
      id: avxcheck
      run: |
        if lscpu | grep -qi avx2 && lscpu | grep -qi fma; then
          echo "supported=true" >> $GITHUB_OUTPUT
        else
          echo "supported=false" >> $GITHUB_OUTPUT
        fi


    # rustfmt always runs — unrelated to AVX/CUDA support
    - name: rustfmt (check only)
      run: cargo fmt --all --check

    - name: Build (AVX enabled)
      if: steps.avxcheck.outputs.supported == 'true'
      run: |
        RUSTFLAGS="-C target-feature=+avx2,+fma" \
        cargo build --workspace --all-targets --features "$POULPY_AVX_FEATURES"

    - name: Clippy (AVX enabled)
      if: steps.avxcheck.outputs.supported == 'true'
      run: |
        RUSTFLAGS="-C target-feature=+avx2,+fma" \
        cargo clippy --workspace --all-targets --features "$POULPY_AVX_FEATURES" -- -D warnings

    - name: Tests (AVX enabled)
      if: steps.avxcheck.outputs.supported == 'true'
      run: |
        RUSTDOCFLAGS="-C target-feature=+avx2 -C target-feature=+fma" \
        RUSTFLAGS="-C target-feature=+avx2,+fma" \
        cargo test --workspace --features "$POULPY_AVX_FEATURES"

    # CKKS test functions are defined in poulpy-ckks/src/test_suite/ and
    # instantiated (via ckks_backend_test_suite!) in poulpy-cpu-ref.
    # cargo test --workspace above already covers them; this step makes the
    # intent explicit and provides a focused failure signal.
    - name: CKKS test suite (AVX enabled)
      if: steps.avxcheck.outputs.supported == 'true'
      run: |
        RUSTFLAGS="-C target-feature=+avx2,+fma" \
        cargo test -p poulpy-cpu-ref --features enable-ckks

    - name: Build (portable mode)
      if: steps.avxcheck.outputs.supported == 'false'
      run: cargo build --workspace --all-targets --features "$POULPY_FEATURES"

    - name: Clippy (portable mode)
      if: steps.avxcheck.outputs.supported == 'false'
      run: cargo clippy --workspace --all-targets --features "$POULPY_FEATURES" -- -D warnings

    - name: Tests (portable mode)
      if: steps.avxcheck.outputs.supported == 'false'
      run: cargo test --workspace --features "$POULPY_FEATURES"

    # Same CKKS-focused step for the portable path.
    - name: CKKS test suite (portable mode)
      if: steps.avxcheck.outputs.supported == 'false'
      run: cargo test -p poulpy-cpu-ref --features enable-ckks

